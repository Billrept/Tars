apiVersion: apps/v1
kind: Deployment
metadata:
  name: tars-frontend
  namespace: tars
  labels:
    app.kubernetes.io/name: tars
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tars
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tars
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: tars-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: frontend-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: frontend-config
          configMap:
            name: tars-frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: tars-frontend
  namespace: tars
  labels:
    app.kubernetes.io/name: tars
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tars
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
