apiVersion: apps/v1
kind: Deployment
metadata:
  name: tars-api
  namespace: tars
  labels:
    app.kubernetes.io/name: tars
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tars
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tars
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: tars-api:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: tars-api-config
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: ephemeris-cache
              mountPath: /app/data/cache
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: ephemeris-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tars-api
  namespace: tars
  labels:
    app.kubernetes.io/name: tars
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tars
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
