apiVersion: v1
kind: ConfigMap
metadata:
  name: tars-api-config
  namespace: tars
data:
  REDIS_URL: redis://redis:6379
  EPHEMERIS_START: "2025-01-01"
  EPHEMERIS_END: "2060-01-01"
  EPHEMERIS_STEP_DAYS: "1"
  EPHEMERIS_CACHE_DIR: /app/data/cache
  HOST: "0.0.0.0"
  PORT: "8000"
  RELOAD: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tars-frontend-config
  namespace: tars
data:
  config.js: |
    window.TARS_CONFIG = {
      API_BASE_URL: "http://localhost:8000",
      WS_BASE_URL: "ws://localhost:8000"
    };
